    <script type="text/babel">
        function App() {
            const [view, setView] = useState('start'); // 'start' | 'quiz' | 'result'
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedIndices, setSelectedIndices] = useState([]);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [arabicTranslation, setArabicTranslation] = useState(false);
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [isDarkMode, setIsDarkMode] = useState(false);
            
            // Matching state logic
            const [matchingState, setMatchingState] = useState({});
            const [activeLeftItem, setActiveLeftItem] = useState(null);
            const [pinCoords, setPinCoords] = useState({});
            const containerRef = useRef(null);
            const currentQ = quizData[currentIndex];

            // Theme Effect
            useEffect(() => {
                if (isDarkMode) {
                    document.body.classList.add('dark');
                    document.body.classList.remove('light');
                } else {
                    document.body.classList.add('light');
                    document.body.classList.remove('dark');
                }
            }, [isDarkMode]);

            const calculatePinCoordinates = () => {
                if (!containerRef.current || currentQ.type !== 'matching') return;
                
                setTimeout(() => {
                    const parentRect = containerRef.current.getBoundingClientRect();
                    const newCoords = {};

                    currentQ.leftItems.forEach((_, idx) => {
                        const pinEl = document.getElementById(`left-pin-${idx}`);
                        if (pinEl) {
                            const rect = pinEl.getBoundingClientRect();
                            newCoords[`left-${idx}`] = {
                                x: rect.left - parentRect.left + rect.width / 2,
                                y: rect.top - parentRect.top + rect.height / 2
                            };
                        }
                    });

                    currentQ.rightItems.forEach((_, idx) => {
                        const pinEl = document.getElementById(`right-pin-${idx}`);
                        if (pinEl) {
                            const rect = pinEl.getBoundingClientRect();
                            newCoords[`right-${idx}`] = {
                                x: rect.left - parentRect.left + rect.width / 2,
                                y: rect.top - parentRect.top + rect.height / 2
                            };
                        }
                    });

                    setPinCoords(newCoords);
                }, 100);
            };

            useEffect(() => {
                calculatePinCoordinates();
                window.addEventListener('resize', calculatePinCoordinates);
                return () => window.removeEventListener('resize', calculatePinCoordinates);
            }, [currentIndex, view]);

            const resetQuiz = () => {
                setCurrentIndex(0);
                setScore(0);
                setSelectedIndices([]);
                setMatchingState({});
                setActiveLeftItem(null);
                setIsSubmitted(false);
                setWrongAnswers([]);
                setView('start');
            };

            const toggleOption = (idx) => {
                if (isSubmitted) return;
                if (currentQ.type === 'single') {
                    setSelectedIndices([idx]);
                } else {
                    if (selectedIndices.includes(idx)) {
                        setSelectedIndices(prev => prev.filter(item => item !== idx));
                    } else {
                        if (selectedIndices.length < currentQ.selectCount) {
                            setSelectedIndices(prev => [...prev, idx]);
                        }
                    }
                }
            };

            const selectLeftPin = (leftIdx) => {
                if (isSubmitted) return;
                setActiveLeftItem(leftIdx);
            };

            const selectRightPin = (rightIdx) => {
                if (isSubmitted || activeLeftItem === null) return;
                
                setMatchingState(prev => {
                    const newState = { ...prev };
                    Object.keys(newState).forEach(key => {
                        if (newState[key] === rightIdx) delete newState[key];
                    });
                    newState[activeLeftItem] = rightIdx;
                    return newState;
                });
                setActiveLeftItem(null);
                calculatePinCoordinates();
            };

            const handleSubmitAnswer = () => {
                if (isSubmitted) return;

                if (currentQ.type === 'matching') {
                    if (Object.keys(matchingState).length < currentQ.leftItems.length) return;
                    let isCorrect = true;
                    currentQ.leftItems.forEach((_, idx) => {
                        if (matchingState[idx] !== currentQ.correctMatches[idx]) isCorrect = false;
                    });
                    if (isCorrect) setScore(prev => prev + 1);
                    else setWrongAnswers(prev => [...prev, { question: currentQ, userSelection: { ...matchingState }, type: 'matching' }]);
                } else {
                    if (selectedIndices.length === 0) return;
                    const sortedSelected = [...selectedIndices].sort();
                    const sortedCorrect = [...currentQ.correct].sort();
                    const isCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedCorrect);
                    
                    if (isCorrect) setScore(prev => prev + 1);
                    else setWrongAnswers(prev => [...prev, { question: currentQ, userSelection: selectedIndices, type: currentQ.type }]);
                }
                setIsSubmitted(true);
            };

            const nextQuestion = () => {
                if (currentIndex < quizData.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setSelectedIndices([]);
                    setMatchingState({});
                    setActiveLeftItem(null);
                    setIsSubmitted(false);
                } else {
                    setView('result');
                }
            };

            const progress = ((currentIndex + 1) / quizData.length) * 100;
            const pinColors = ['#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6'];

            const renderExhibit = (exhibitType) => {
                if (exhibitType === 'network-172') {
                    return (
                        <div className="mb-6 p-4 rounded-2xl glass-card flex flex-col items-center">
                            <span className="text-xs font-semibold mb-4 opacity-70 block w-full text-center">Network Topology</span>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-6">
                                {/* Router A Side */}
                                <div className="flex flex-col items-center gap-2 relative">
                                    <div className="w-16 h-8 rounded-full border-2 border-emerald-500 flex items-center justify-center font-bold text-xs bg-emerald-500/20">Router A</div>
                                    <div className="w-1 h-6 bg-slate-500"></div>
                                    <div className="w-16 h-6 border-2 border-slate-500 rounded bg-slate-500/20 text-[10px] flex items-center justify-center">Switch</div>
                                    <div className="w-1 h-6 bg-slate-500"></div>
                                    <i className="fas fa-desktop text-2xl text-slate-400"></i>
                                    {/* Subnet Label */}
                                    <div className="absolute top-10 -left-28 font-mono text-xs font-bold px-2 py-1 rounded bg-slate-500/20">
                                        172.16.16.0 /22
                                    </div>
                                </div>
                                {/* WAN Link */}
                                <div className="hidden md:flex items-center text-red-500">
                                    <i className="fas fa-bolt"></i><div className="w-12 h-0.5 bg-red-500"></div><i className="fas fa-bolt"></i>
                                </div>
                                {/* Router B Side */}
                                <div className="flex flex-col items-center gap-2">
                                    <div className="w-16 h-8 rounded-full border-2 border-emerald-500 flex items-center justify-center font-bold text-xs bg-emerald-500/20">Router B</div>
                                    <div className="w-1 h-6 bg-slate-500"></div>
                                    <div className="w-16 h-6 border-2 border-slate-500 rounded bg-slate-500/20 text-[10px] flex items-center justify-center">Switch</div>
                                    <div className="w-1 h-6 bg-slate-500"></div>
                                    <i className="fas fa-desktop text-2xl text-slate-400"></i>
                                </div>
                            </div>
                        </div>
                    );
                }
                if (exhibitType === 'tracert-exhibit') {
                    return (
                        <div className="terminal-box p-4 rounded-xl text-xs mb-6 overflow-x-auto shadow-inner border border-opacity-50 font-mono">
                            <div className="mb-2 opacity-70">PC&gt; tracert www.cisco.com</div>
                            <div>Tracing route to 172.24.2.1 over a maximum of 30 hops:</div>
                            <div className="mt-2 text-[10px] md:text-xs leading-relaxed">
                                1 &nbsp; 1 ms &nbsp; 0 ms &nbsp; 0 ms &nbsp; 172.20.0.254<br/>
                                2 &nbsp; 0 ms &nbsp; 0 ms &nbsp; 0 ms &nbsp; 172.20.1.18<br/>
                                3 &nbsp; 1 ms &nbsp; 1 ms &nbsp; 1 ms &nbsp; 172.20.1.1<br/>
                                4 &nbsp; 2 ms &nbsp; 0 ms &nbsp; 1 ms &nbsp; 172.20.1.22<br/>
                                5 &nbsp; 2 ms &nbsp; 2 ms &nbsp; 2 ms &nbsp; 172.24.255.17<br/>
                                6 &nbsp; 2 ms &nbsp; 2 ms &nbsp; 3 ms &nbsp; 172.24.255.13<br/>
                                7 &nbsp; 2 ms &nbsp; 1 ms &nbsp; 2 ms &nbsp; 172.24.255.4<br/>
                                8 &nbsp; 3 ms &nbsp; 1 ms &nbsp; 1 ms &nbsp; 172.24.2.1
                            </div>
                            <div className="mt-2 opacity-70">Trace complete.</div>
                        </div>
                    );
                }
                return null;
            };

            if (view === 'start') {
                return (
                    <div className="min-h-[85vh] flex items-center justify-center p-4">
                        <div className="glass-card max-w-3xl w-full p-8 md:p-12 rounded-3xl text-center relative overflow-hidden transition-colors">
                            {/* Theme Toggle in Start Screen */}
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="absolute top-6 right-6 w-10 h-10 rounded-full bg-opacity-20 flex items-center justify-center text-xl transition-all hover:scale-110" style={{ backgroundColor: isDarkMode ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)' }}>
                                <i className={`fas ${isDarkMode ? 'fa-sun text-amber-400' : 'fa-moon text-indigo-600'}`}></i>
                            </button>

                            <div className="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-6 text-4xl shadow-lg shadow-blue-500/30">
                                <i className="fas fa-sitemap"></i>
                            </div>
                            <h1 className="text-3xl md:text-5xl font-extrabold mb-3 tracking-wide">CCNA Modules 11-13</h1>
                            <p className="font-semibold text-lg md:text-xl opacity-80 mb-8">IP Addressing Exam Simulator</p>
                            
                            <div className="grid grid-cols-3 gap-4 mb-8">
                                <div className="p-4 rounded-2xl option-card">
                                    <span className="block text-blue-500 font-bold text-3xl">{quizData.length}</span>
                                    <span className="text-xs mt-1 block opacity-70">Questions</span>
                                </div>
                                <div className="p-4 rounded-2xl option-card">
                                    <span className="block text-emerald-500 font-bold text-3xl">IPv4/v6</span>
                                    <span className="text-xs mt-1 block opacity-70">Subnetting</span>
                                </div>
                                <div className="p-4 rounded-2xl option-card">
                                    <span className="block text-purple-500 font-bold text-3xl">100%</span>
                                    <span className="text-xs mt-1 block opacity-70">Match</span>
                                </div>
                            </div>

                            <button 
                                onClick={() => setView('quiz')}
                                className="w-full max-w-md bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 rounded-2xl transition-all transform hover:scale-[1.01] shadow-xl text-lg"
                            >
                                Start Exam
                            </button>
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                const percentage = (score / quizData.length) * 100;
                return (
                    <div className="min-h-screen py-6">
                        <div className="glass-card max-w-4xl w-full mx-auto p-6 md:p-10 rounded-3xl">
                            <h2 className="text-3xl md:text-4xl font-extrabold text-center mb-2">Exam Result</h2>
                            <p className="opacity-70 text-center mb-8">Modules 11-13: IP Addressing</p>
                            
                            <div className="grid md:grid-cols-2 gap-8 items-center mb-8 p-6 rounded-2xl option-card">
                                <div className="relative w-48 h-48 mx-auto">
                                    <svg className="w-full h-full transform -rotate-90">
                                        <circle cx="96" cy="96" r="82" stroke="currentColor" strokeOpacity="0.1" strokeWidth="12" fill="transparent" />
                                        <circle 
                                            cx="96" cy="96" r="82" 
                                            stroke={percentage >= 75 ? "#10b981" : percentage >= 50 ? "#f59e0b" : "#ef4444"} 
                                            strokeWidth="12" fill="transparent" 
                                            strokeDasharray={515.2}
                                            strokeDashoffset={515.2 - (515.2 * percentage) / 100}
                                            className="transition-all duration-1000"
                                        />
                                    </svg>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                        <span className="text-4xl font-extrabold">{Math.round(percentage)}%</span>
                                        <span className="text-sm mt-1 opacity-70">{score} / {quizData.length} Correct</span>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-xl font-bold">Performance Assessment:</h3>
                                    <div className="p-4 rounded-xl terminal-box opacity-90">
                                        <p className="text-sm leading-relaxed italic">
                                            {percentage >= 80 ? "Excellent achievement! You have mastered IPv4/IPv6 subnetting and ICMP messaging mechanics." : 
                                             percentage >= 60 ? "Good work! Review your Subnet calculations and IPv6 address compression rules to maximize your score." : 
                                             "Further study is required for these modules. Re-read the rules for SLAAC, ICMP codes, and IPv4 block allocations."}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {wrongAnswers.length > 0 && (
                                <div className="mb-8">
                                    <h3 className="text-xl font-bold text-red-500 mb-4 flex items-center gap-2">
                                        <i className="fas fa-triangle-exclamation"></i>
                                        Review Incorrect Answers ({wrongAnswers.length})
                                    </h3>
                                    <div className="space-y-5 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                                        {wrongAnswers.map((wa, wIdx) => (
                                            <div key={wIdx} className="p-5 rounded-2xl option-card border border-red-500/20">
                                                <p className="font-semibold text-sm mb-3">
                                                    Q{wa.question.id}: {wa.question.q}
                                                </p>
                                                
                                                {wa.type === 'matching' ? (
                                                    <span className="text-xs text-red-500 block font-bold mb-2">Incorrect connections made.</span>
                                                ) : (
                                                    <div className="grid md:grid-cols-2 gap-4 my-2">
                                                        <div className="p-3 rounded-xl border border-red-500/20 bg-red-500/5">
                                                            <span className="text-xs text-red-500 block font-bold">Your Selection:</span>
                                                            {wa.userSelection.map(sIdx => (
                                                                <div key={sIdx} className="text-xs mt-1 opacity-80">• {wa.question.options[sIdx]}</div>
                                                            ))}
                                                        </div>
                                                        <div className="p-3 rounded-xl border border-emerald-500/20 bg-emerald-500/5">
                                                            <span className="text-xs text-emerald-500 block font-bold">Correct Solution:</span>
                                                            {wa.question.correct.map(cIdx => (
                                                                <div key={cIdx} className="text-xs mt-1 opacity-80">• {wa.question.options[cIdx]}</div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                <div className="text-xs mt-2 p-3 rounded-lg terminal-box opacity-90 border border-opacity-20">
                                                    <strong className="block mb-1">Explanation:</strong>
                                                    {wa.question.explanation}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <button 
                                onClick={resetQuiz}
                                className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg"
                            >
                                Try Exam Again
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="w-full flex flex-col min-h-[90vh] py-4">
                    {/* Header Controls */}
                    <div className="flex flex-wrap justify-between items-center gap-4 mb-4 px-2">
                        <button onClick={resetQuiz} className="opacity-70 hover:opacity-100 transition-opacity flex items-center gap-2 font-semibold">
                            <i className="fas fa-arrow-left"></i> Exit
                        </button>
                        
                        <div className="flex items-center gap-4">
                            {/* Theme Toggle */}
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-8 h-8 rounded-full flex items-center justify-center text-lg transition-transform hover:scale-110">
                                <i className={`fas ${isDarkMode ? 'fa-sun text-amber-400' : 'fa-moon text-indigo-600'}`}></i>
                            </button>

                            {/* Bilingual Toggle */}
                            <div className="flex items-center gap-2">
                                <span className="text-xs font-semibold opacity-70">عربي</span>
                                <button 
                                    onClick={() => setArabicTranslation(!arabicTranslation)}
                                    className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${arabicTranslation ? 'bg-indigo-600' : 'bg-slate-400'}`}
                                >
                                    <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${arabicTranslation ? 'translate-x-6' : 'translate-x-1'}`} />
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Timeline */}
                    <div className="mb-6 flex gap-2 overflow-x-auto pb-3 custom-scrollbar px-2">
                        {quizData.map((q, idx) => {
                            let dotStyle = "flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs transition-all border ";
                            if (idx === currentIndex) {
                                dotStyle += "bg-blue-600 text-white border-blue-400 scale-110 shadow-lg shadow-blue-500/30";
                            } else if (idx < currentIndex) {
                                dotStyle += "option-card opacity-80 border-blue-500/30 text-blue-500";
                            } else {
                                dotStyle += "option-card opacity-50 border-opacity-10";
                            }
                            return (
                                <button key={idx} onClick={() => jumpToQuestion(idx)} className={dotStyle}>{q.id}</button>
                            );
                        })}
                    </div>

                    <div className="flex justify-between text-xs font-bold opacity-60 mb-2 px-3">
                        <span>Question {currentIndex + 1} of {quizData.length}</span>
                        <span>{Math.round(progress)}%</span>
                    </div>
                    <div className="w-full option-card h-2 rounded-full mb-6 overflow-hidden">
                        <div className="bg-gradient-to-r from-blue-500 to-indigo-500 h-full progress-bar" style={{ width: `${progress}%` }}></div>
                    </div>

                    {/* Question Card */}
                    <div className="glass-card p-6 md:p-8 rounded-3xl shadow-xl flex-grow flex flex-col justify-between">
                        <div>
                            <div className="flex justify-between items-center mb-5">
                                <span className="option-card text-xs px-3 py-1 rounded-full font-semibold uppercase tracking-wider text-indigo-500 border border-indigo-500/20">
                                    {currentQ.type === 'single' ? 'Single Choice' : currentQ.type === 'matching' ? 'Point A to B Matcher' : `Multi-Select (${currentQ.selectCount})`}
                                </span>
                                <span className="text-xs opacity-50 font-mono">Q-ID: {currentQ.id}</span>
                            </div>

                            <h2 className="text-lg md:text-xl font-bold mb-6 leading-relaxed">
                                {arabicTranslation ? currentQ.q_ar : currentQ.q}
                            </h2>

                            {currentQ.hasExhibit && renderExhibit(currentQ.hasExhibit)}

                            {/* Matcher UI */}
                            {currentQ.type === 'matching' ? (
                                <div className="space-y-4 mb-8 relative" ref={containerRef}>
                                    <div className="option-card p-3 rounded-xl text-xs text-indigo-500 mb-6 border flex justify-between items-center">
                                        <span>
                                            <i className="fas fa-info-circle mr-1.5"></i>
                                            {arabicTranslation ? "انقر على دائرة اليسار ثم الدائرة المطابقة باليمين للتوصيل" : "Click a pin on the left, then click its matching pin on the right."}
                                        </span>
                                        {!isSubmitted && (
                                            <button onClick={() => {setMatchingState({}); setActiveLeftItem(null);}} className="text-[10px] px-2 py-1 rounded border opacity-80 hover:opacity-100">Reset</button>
                                        )}
                                    </div>

                                    <svg className="absolute inset-0 pointer-events-none w-full h-full z-10" style={{ minHeight: '250px' }}>
                                        {Object.keys(matchingState).map((leftKey) => {
                                            const leftIdx = parseInt(leftKey);
                                            const rightIdx = matchingState[leftIdx];
                                            const start = pinCoords[`left-${leftIdx}`];
                                            const end = pinCoords[`right-${rightIdx}`];
                                            if (!start || !end) return null;

                                            const color = pinColors[leftIdx % pinColors.length];
                                            const isCorrect = isSubmitted && matchingState[leftIdx] === currentQ.correctMatches[leftIdx];
                                            const strokeColor = isSubmitted ? (isCorrect ? '#10b981' : '#ef4444') : color;

                                            return (
                                                <g key={leftKey}>
                                                    <path 
                                                        d={`M ${start.x} ${start.y} C ${(start.x + end.x)/2} ${start.y}, ${(start.x + end.x)/2} ${end.y}, ${end.x} ${end.y}`}
                                                        fill="none" stroke={strokeColor} strokeWidth={isSubmitted ? "3" : "4"}
                                                        className={!isSubmitted ? "connecting-line" : ""} opacity="0.85"
                                                    />
                                                    <circle cx={start.x} cy={start.y} r="6" fill={strokeColor} />
                                                    <circle cx={end.x} cy={end.y} r="6" fill={strokeColor} />
                                                </g>
                                            );
                                        })}
                                    </svg>

                                    <div className="grid grid-cols-2 gap-8 md:gap-16 items-start relative z-20">
                                        <div className="space-y-4">
                                            {(arabicTranslation ? currentQ.leftItems_ar : currentQ.leftItems).map((leftItem, idx) => {
                                                const isConnected = matchingState[idx] !== undefined;
                                                const isActive = activeLeftItem === idx;
                                                const color = pinColors[idx % pinColors.length];
                                                return (
                                                    <div key={idx} className={`flex items-center gap-3 p-3 md:p-4 rounded-xl border transition-all ${isActive ? 'shadow-lg border-indigo-500 bg-indigo-500/10' : 'option-card'}`}>
                                                        <div 
                                                            id={`left-pin-${idx}`}
                                                            onClick={() => selectLeftPin(idx)}
                                                            className={`w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center font-bold text-sm cursor-pointer shadow-sm z-30 transition-transform ${!isConnected ? 'pin-unmatched hover:scale-110 border-2' : ''}`}
                                                            style={isConnected ? { backgroundColor: color, color: '#fff', border: `2px solid ${color}` } : {}}
                                                        >
                                                            {leftItem.letter}
                                                        </div>
                                                        <div className="flex-1 text-xs md:text-sm font-medium leading-tight opacity-90">{leftItem.text}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="space-y-4">
                                            {currentQ.rightItems.map((rightItem, idx) => {
                                                const matchedLeftIdx = Object.keys(matchingState).find(key => matchingState[key] === idx);
                                                const isConnected = matchedLeftIdx !== undefined;
                                                const color = isConnected ? pinColors[parseInt(matchedLeftIdx) % pinColors.length] : '';
                                                return (
                                                    <div key={idx} className="flex items-center gap-3 p-3 md:p-4 rounded-xl border option-card transition-all">
                                                        <div 
                                                            id={`right-pin-${idx}`}
                                                            onClick={() => selectRightPin(idx)}
                                                            className={`w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center font-bold text-sm cursor-pointer shadow-sm z-30 transition-transform ${!isConnected ? 'match-target border-2 border-dashed hover:scale-110' : ''}`}
                                                            style={isConnected ? { backgroundColor: color, color: '#fff', border: `2px solid ${color}` } : {}}
                                                        >
                                                            {isConnected ? currentQ.leftItems[parseInt(matchedLeftIdx)].letter : '?'}
                                                        </div>
                                                        <div className="flex-1 text-xs md:text-sm font-mono opacity-90 leading-tight">{rightItem.text}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-3 mb-8">
                                    {currentQ.options.map((opt, idx) => {
                                        const isSelected = selectedIndices.includes(idx);
                                        const isCorrectOpt = currentQ.correct.includes(idx);
                                        
                                        let cardClass = "w-full text-left p-4 rounded-2xl border-2 transition-all flex items-center justify-between cursor-pointer ";
                                        if (!isSubmitted) {
                                            cardClass += isSelected ? "border-blue-500 bg-blue-500/10 shadow-md text-blue-600 dark:text-blue-300" : "option-card";
                                        } else {
                                            if (isCorrectOpt) cardClass += "border-emerald-500 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-semibold";
                                            else if (isSelected) cardClass += "border-red-500 bg-red-500/10 text-red-600 dark:text-red-400";
                                            else cardClass += "option-card opacity-50";
                                        }

                                        return (
                                            <div key={idx} onClick={() => toggleOption(idx)} className={cardClass}>
                                                <div className="flex items-center gap-3.5 flex-1">
                                                    <div className="flex-shrink-0">
                                                        {currentQ.type === 'single' ? (
                                                            <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${isSelected ? 'border-blue-500 bg-blue-500' : 'border-gray-400'}`}>
                                                                {isSelected && <div className="w-2.5 h-2.5 rounded-full bg-white"></div>}
                                                            </div>
                                                        ) : (
                                                            <div className={`w-5 h-5 rounded border-2 flex items-center justify-center ${isSelected ? 'border-blue-500 bg-blue-500' : 'border-gray-400'}`}>
                                                                {isSelected && <i className="fas fa-check text-[10px] text-white"></i>}
                                                            </div>
                                                        )}
                                                    </div>
                                                    <span className="text-sm md:text-base">{arabicTranslation ? currentQ.options_ar[idx] : opt}</span>
                                                </div>
                                                {isSubmitted && (
                                                    <div className="flex-shrink-0 ml-2">
                                                        {isCorrectOpt && <i className="fas fa-check-circle text-emerald-500 text-lg"></i>}
                                                        {isSelected && !isCorrectOpt && <i className="fas fa-times-circle text-red-500 text-lg"></i>}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {isSubmitted && (
                                <div className="p-5 rounded-2xl mb-8 terminal-box border-opacity-20 animate-fadeIn border">
                                    <h4 className="font-bold mb-2 flex items-center text-amber-500 dark:text-amber-400 text-sm">
                                        <i className="fas fa-lightbulb mr-2"></i> Explanation / الشرح:
                                    </h4>
                                    <p className="text-sm leading-relaxed mb-3 opacity-90">{currentQ.explanation}</p>
                                    <p className="text-sm leading-relaxed border-t border-opacity-20 pt-3 opacity-90">{currentQ.explanation_ar}</p>
                                </div>
                            )}
                        </div>

                        <div>
                            {!isSubmitted ? (
                                <button 
                                    onClick={handleSubmitAnswer}
                                    disabled={currentQ.type === 'matching' ? Object.keys(matchingState).length < currentQ.leftItems.length : selectedIndices.length === 0}
                                    className={`w-full font-bold py-4 rounded-2xl transition-all shadow-lg text-white ${
                                        (currentQ.type === 'matching' ? Object.keys(matchingState).length === currentQ.leftItems.length : selectedIndices.length > 0)
                                            ? 'bg-blue-600 hover:bg-blue-700 active:scale-95' 
                                            : 'bg-gray-400 dark:bg-slate-700 cursor-not-allowed'
                                    }`}
                                >
                                    {currentQ.type === 'matching' ? 'Submit Matching' : 'Check Answer'}
                                </button>
                            ) : (
                                <button onClick={nextQuestion} className="w-full bg-slate-800 hover:bg-slate-900 text-white dark:bg-slate-100 dark:hover:bg-white dark:text-slate-900 font-extrabold py-4 rounded-2xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2 group">
                                    {currentIndex === quizData.length - 1 ? 'Finish Exam' : 'Next Question'}
                                    <i className="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
